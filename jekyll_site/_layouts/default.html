<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/townsuite-logo.svg' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% if site.accent %}
  <style>:root{ --accent: {{ site.accent }}; --accent-soft: {{ site.accent_soft }}; }</style>
  {% endif %}
</head>
<body>
  {{ content }}
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
